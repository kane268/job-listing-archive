name: Job source capture
description: Save a place to look for interesting job listings
labels: ["source"]
body:
  - type: markdown
    attributes:
      value: "This repository is public. Only include public-safe notes."

  - type: input
    id: url
    attributes:
      label: Source URL
      placeholder: "https://example.com/jobs"
    validations:
      required: true

  - type: input
    id: name
    attributes:
      label: Source name
      placeholder: "Anthropic"
    validations:
      required: true

  - type: dropdown
    id: source_type
    attributes:
      label: Source type
      options:
        - company-careers
        - job-board
        - aggregator
        - newsletter
        - other
    validations:
      required: false

  - type: input
    id: tags
    attributes:
      label: Tags
      description: Optional comma separated tags.
      placeholder: "ai, infra, remote"
    validations:
      required: false

  - type: textarea
    id: notes
    attributes:
      label: Notes
      placeholder: "Why is this worth checking? Any filters or role families to watch?"
    validations:
      required: false
