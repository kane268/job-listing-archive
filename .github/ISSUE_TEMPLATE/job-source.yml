name: Job source capture
description: Save a company to check for interesting job listings
labels: ["source"]
body:
  - type: markdown
    attributes:
      value: "This repository is public. Only include public-safe information."

  - type: input
    id: name
    attributes:
      label: Company name
      placeholder: "Anthropic"
    validations:
      required: true

  - type: input
    id: url
    attributes:
      label: Jobs URL
      placeholder: "https://example.com/jobs"
    validations:
      required: true

  - type: input
    id: homepage_url
    attributes:
      label: Company home page
      placeholder: "https://example.com"
    validations:
      required: true
