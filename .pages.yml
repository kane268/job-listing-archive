content:
  - name: archive_data
    label: Archive Data
    type: group
    items:
      - name: job_sources
        label: Saved Companies
        type: file
        path: data/job-sources.json
        format: json
        fields:
          - name: sources
            label: Companies
            type: object
            list:
              collapsible:
                collapsed: true
                summary: "{name}"
            fields:
              - name: name
                label: Company name
                type: string
                required: true
              - name: url
                label: Jobs URL
                type: string
                required: true

settings:
  content:
    merge: true
  commit:
    identity: app
    templates:
      create: "content: create {path}"
      update: "content: update {path}"
      delete: "content: delete {path}"
      rename: "content: rename {oldPath} -> {newPath}"
