name: Job listing capture
description: Save an interesting tech job listing URL
labels: ["inbox"]
body:
  - type: markdown
    attributes:
      value: "This repository is public. Only include URL and public-safe notes. The capture workflow will fetch the listing text."

  - type: input
    id: url
    attributes:
      label: Source URL
      placeholder: "https://..."
    validations:
      required: true

  - type: input
    id: company
    attributes:
      label: Company
    validations:
      required: false

  - type: input
    id: role
    attributes:
      label: Role title
    validations:
      required: false

  - type: dropdown
    id: role_family
    attributes:
      label: Role family
      options:
        - frontend
        - backend
        - full-stack
        - data
        - ML/AI
        - infra/platform
        - security
        - developer-experience
        - engineering-management
        - product/other
    validations:
      required: false

  - type: dropdown
    id: seniority
    attributes:
      label: Seniority
      options:
        - intern
        - junior
        - mid
        - senior
        - staff
        - senior-staff
        - principal
        - manager
        - director
        - head
        - other
    validations:
      required: false

  - type: textarea
    id: why
    attributes:
      label: Why did this catch your eye?
      placeholder: "Interesting requirements, unusual role shape, good description, salary signal, etc."
    validations:
      required: false
