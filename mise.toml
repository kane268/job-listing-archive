[tools]
python = "3.12"

[tasks.default]
description = "Show validation help"
run = "python3 scripts/workflow.py help"

[tasks.help]
description = "Show validation help"
alias = ["h"]
run = "python3 scripts/workflow.py help"

[tasks.index]
description = "Rebuild data/index.csv"
run = "python3 scripts/workflow.py index"

[tasks.site]
description = "Rebuild static GitHub Pages site artifact"
run = "python3 scripts/build_site.py"

[tasks.check]
description = "Run tests and archive checks"
alias = ["c"]
run = "python3 scripts/workflow.py check"
