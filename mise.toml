[tools]
python = "3.12"

[env]
JOB_LISTINGS_SOURCE = "{{env.HOME}}/Library/Mobile Documents/com~apple~CloudDocs/Job Listings"

[tasks.default]
description = "Show the simple workflow"
run = "python3 scripts/workflow.py help"

[tasks.help]
description = "Show the simple workflow"
alias = ["h"]
run = "python3 scripts/workflow.py help"

[tasks.setup]
description = "Install Python package requirements"
run = "python3 scripts/workflow.py setup"

[tasks.import]
description = "Import legacy files from the iCloud Job Listings folder"
alias = ["i"]
run = "python3 scripts/workflow.py import"

[tasks.index]
description = "Rebuild data/index.csv"
run = "python3 scripts/workflow.py index"

[tasks.site]
description = "Rebuild static GitHub Pages site"
run = "python3 scripts/build_site.py"

[tasks.validate-capture]
description = "Validate live URL capture against archived source URLs"
run = "python3 scripts/validate_url_capture.py"

[tasks.check]
description = "Run tests and archive checks"
alias = ["c"]
run = "python3 scripts/workflow.py check"

[tasks.save]
description = "Test, commit all changes, and push to GitHub"
alias = ["s"]
run = "python3 scripts/workflow.py save"

[tasks.update]
description = "Import legacy iCloud listings, test, commit, and push"
alias = ["u"]
run = "python3 scripts/workflow.py update"

[tasks.status]
description = "Show archive count and git status"
run = "python3 scripts/workflow.py status"

[tasks.capture]
description = "Open the web listing capture UI in manage mode"
run = "python3 scripts/workflow.py capture"

[tasks.capture-source]
description = "Open the GitHub job source capture form"
run = "python3 scripts/workflow.py capture-source"

[tasks.sources]
description = "List places to look for jobs"
alias = ["src"]
run = "python3 scripts/workflow.py sources"

[tasks.browse]
description = "Open active job source URLs"
run = "python3 scripts/workflow.py browse"

[tasks.add-source]
description = "Add or update a job source"
run = "python3 scripts/workflow.py add-source"
